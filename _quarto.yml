project:
  type: website

editor:
  render-on-save: true

website:
  title: "DigiPres.org Practices"
  sidebar:
    style: "floating"
    contents:
      - index.qmd
      - href: reports/index.qmd
        text: "Reports"
        #section: "Reports"
        #contents: reports/*/index.qmd
      - href: tool-demos/index.qmd
        text: "Tool Demos"
        #section: "Tool Demos"
        #contents: tool-demos/*/index.qmd
  favicon: logo.png
  twitter-card: true
  site-url: https://digipres.org/practices/
  search: true
  repo-url: https://github.com/digipres/practices/
  repo-actions: [edit]
  navbar:
    right:
      - icon: github
        href: https://github.com/digipres/practices
  draft-mode: unlinked
  announcement:
    icon: info-circle
    dismissable: true
    content: "**Warning** - This is an early-stage experimental prototype! All may change! See the homepage for more information."
    type: primary
    position: below-navbar

syntax-highlighting: pygments

format:
  html:
    theme:
      - cosmo
    css: styles.css
    toc: true
    code-fold: show
    code-overflow: wrap
    number-sections: true
  epub: default
  pdf:
    title: pdf-title
    toc: true
    papersize: a4
    number-sections: true
    colorlinks: true